<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RDA Net Kit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script defer src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script defer src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script defer src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <script defer src="version.js"></script>
    <script defer src="ip-utils.js"></script>
    <script defer src="oui-db.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0d12;
        --panel: #16161e;
        --card: #1e1e28;
        --border: #2a2a3a;
        --text: #e2e8f0;
        --muted: #8892a0;
        --dim: #555e6e;
        --cyan: #00d4c8;
        --blue: #4a9eff;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #f59e0b;
        --purple: #c084fc;
        --magenta: #f472b6;
        --btn-text: #000;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
        --radius: 6px;
        --sidebar: 220px;
        --header-h: 56px;
        --footer-h: 32px;
      }
      .light {
        --bg: #f8fafc;
        --panel: #ffffff;
        --card: #f1f5f9;
        --border: #e2e8f0;
        --text: #334155;
        --muted: #64748b;
        --dim: #94a3b8;
        --cyan: #0284c7;
        --blue: #2563eb;
        --green: #16a34a;
        --red: #dc2626;
        --yellow: #d97706;
        --purple: #7c3aed;
        --magenta: #db2777;
        --btn-text: #fff;
      }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 14px;
        overflow: hidden;
      }
      input,
      textarea,
      select {
        font-family: var(--sans);
        outline: none;
      }
      button {
        cursor: pointer;
        font-family: var(--sans);
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--panel);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* Layout */
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      .header {
        height: var(--header-h);
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: stretch;
        padding: 0;
        flex-shrink: 0;
        z-index: 100;
      }
      .logo-area {
        width: var(--sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
      }
      .mobile-menu-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        width: 48px;
        background: transparent;
        border: none;
        color: var(--text);
        padding: 0 12px;
        border-right: 1px solid var(--border);
      }
      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
        z-index: 1000;
        animation: fadein 0.2s ease;
      }
      .sidebar-mobile-header {
        display: none;
        padding: 16px;
        border-bottom: 1px solid var(--border);
        align-items: center;
        justify-content: space-between;
      }
      .sidebar-close {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--muted);
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .footer {
        height: var(--footer-h);
        background: var(--panel);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        flex-shrink: 0;
        font-size: 11px;
        color: var(--muted);
        z-index: 100;
      }
      .main-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      .sidebar {
        width: var(--sidebar);
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
      }
      .sidebar-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: none;
      } /* Hidden as requested */

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.3px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--cyan), var(--blue));
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: var(--btn-text);
        font-weight: 700;
        font-family: var(--mono);
        flex-shrink: 0;
      }
      .logo-sub {
        font-size: 11px;
        color: var(--muted);
        font-weight: 400;
        margin-top: 1px;
      }

      .sidebar-group-title {
        padding: 16px 16px 4px;
        font-size: 11px;
        font-weight: 700;
        color: var(--cyan);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        border-top: 1px solid var(--border);
        margin-top: 8px;
      }
      .sidebar-group-title:first-of-type {
        border-top: none;
        margin-top: 0;
      }
      .sidebar-section {
        padding: 12px 16px 6px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--dim);
      }

      /* Search */
      .sidebar-search {
        padding: 12px 12px 8px;
        background: var(--panel);
        z-index: 10;
        border-bottom: 1px solid var(--border);
      }
      .search-input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .search-input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 7px 10px 7px 30px;
        font-size: 12px;
        color: var(--text);
        transition: all 0.15s;
      }
      .search-input:focus {
        border-color: var(--cyan);
        background: var(--panel);
      }
      .search-icon {
        position: absolute;
        left: 10px;
        color: var(--dim);
        pointer-events: none;
      }
      .search-clear {
        position: absolute;
        right: 8px;
        color: var(--dim);
        cursor: pointer;
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
      }
      .search-clear:hover {
        background: var(--border);
        color: var(--text);
      }

      /* Command Palette */
      .cmd-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 12vh;
        z-index: 1000;
        backdrop-filter: blur(4px);
        animation: fadein 0.15s ease-out;
      }
      .cmd-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        width: 600px;
        max-width: 95vw;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: 70vh;
      }
      .cmd-input-wrap {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }
      .cmd-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-size: 16px;
        color: var(--text);
        font-family: var(--sans);
      }
      .cmd-results {
        overflow-y: auto;
        padding: 8px 0;
      }
      .cmd-group {
        padding: 8px 16px 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--dim);
        letter-spacing: 1px;
      }
      .cmd-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        cursor: pointer;
        transition: all 0.1s;
        gap: 12px;
        user-select: none;
      }
      .cmd-item.active {
        background: var(--card);
        border-left: 3px solid var(--cyan);
        padding-left: 13px;
      }
      .cmd-item-main {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }
      .cmd-item-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }
      .cmd-item-desc {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 300px;
      }
      .cmd-item-badge {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--border);
        color: var(--muted);
        font-weight: 600;
        font-family: var(--mono);
      }
      .cmd-hint {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--dim);
        background: var(--bg);
      }
      .kbd {
        background: var(--card);
        border: 1px solid var(--border);
        padding: 2px 5px;
        border-radius: 3px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin: 0 2px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: var(--radius);
        margin: 1px 8px;
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
        transition: all 0.15s;
        border: 1px solid transparent;
        user-select: none;
      }
      .nav-item:hover {
        background: var(--card);
        color: var(--text);
      }
      .nav-item.active {
        background: rgba(0, 212, 200, 0.1);
        border-color: rgba(0, 212, 200, 0.2);
        color: var(--cyan);
      }
      .nav-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
        opacity: 0.7;
      }

      /* Main */
      .main {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }
      .content {
        padding: 24px;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
      }

      .topbar-title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.4px;
        color: var(--text);
      }
      .topbar-badge {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 10px;
        background: rgba(0, 212, 200, 0.15);
        color: var(--cyan);
        font-weight: 600;
        border: 1px solid rgba(0, 212, 200, 0.25);
        margin-left: 10px;
      }

      /* Cards */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--muted);
        margin-bottom: 14px;
      }

      /* Inputs */
      .field {
        margin-bottom: 14px;
      }
      .label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .input {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 12px;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text);
        transition: border-color 0.15s;
      }
      .input:focus {
        border-color: var(--cyan);
      }
      .input.error {
        border-color: var(--red);
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-row .input {
        flex: 1;
      }
      .select {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 12px;
        font-family: var(--sans);
        font-size: 13px;
        color: var(--text);
      }
      .hint {
        font-size: 11px;
        color: var(--dim);
        margin-top: 4px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: var(--radius);
        border: 1px solid transparent;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn-primary {
        background: var(--cyan);
        color: var(--btn-text);
        border-color: var(--cyan);
      }
      .btn-primary:hover {
        opacity: 0.88;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }
      .btn-ghost:hover {
        background: var(--card);
        color: var(--text);
      }
      .btn-icon {
        padding: 7px 10px;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 12px;
      }
      .btn-danger {
        background: transparent;
        color: var(--red);
        border-color: rgba(239, 68, 68, 0.3);
      }
      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.1);
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .theme-toggle-btn {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        padding: 0;
        flex-shrink: 0;
      }
      .theme-toggle-btn:hover {
        background: var(--panel);
        color: var(--text);
        border-color: var(--muted);
        box-shadow: none;
      }

      /* Results */
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 10px;
      }
      .result-item {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .result-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
      }
      .result-value {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text);
        font-weight: 500;
        word-break: break-all;
      }
      .result-value.accent {
        color: var(--cyan);
      }
      .result-value.green {
        color: var(--green);
      }
      .result-value.yellow {
        color: var(--yellow);
      }
      .result-value.red {
        color: var(--red);
      }
      .copy-btn {
        flex-shrink: 0;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 3px 7px;
        font-size: 10px;
        color: var(--dim);
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--sans);
      }
      .copy-btn:hover {
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .copy-btn.copied {
        border-color: var(--green);
        color: var(--green);
      }

      /* Table */
      .table-wrap {
        overflow-x: auto;
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        background: var(--panel);
        color: var(--muted);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 9px 14px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 9px 14px;
        border-bottom: 1px solid rgba(42, 42, 58, 0.5);
        font-family: var(--mono);
        font-size: 12px;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.025);
      }
      .td-label {
        font-family: var(--sans);
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-family: var(--sans);
        font-weight: 600;
      }
      .badge-cyan {
        background: rgba(0, 212, 200, 0.15);
        color: var(--cyan);
      }
      .badge-green {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .badge-yellow {
        background: rgba(245, 158, 11, 0.15);
        color: var(--yellow);
      }
      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .badge-blue {
        background: rgba(74, 158, 255, 0.15);
        color: var(--blue);
      }
      .badge-purple {
        background: rgba(167, 139, 250, 0.15);
        color: var(--purple);
      }
      .badge-gray {
        background: rgba(136, 146, 160, 0.15);
        color: var(--muted);
      }

      /* Error */
      .err {
        color: var(--red);
        font-size: 12px;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* VLSM specific */
      .vlsm-row {
        display: grid;
        grid-template-columns: 1fr 100px 36px;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
      }
      .vlsm-row:hover {
        border-color: var(--cyan);
      }

      /* Subnet map */
      .smap-bar {
        height: 28px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 11px;
        font-family: var(--mono);
        font-weight: 600;
        margin-bottom: 4px;
        transition: opacity 0.15s;
        cursor: default;
      }
      .smap-bar:hover {
        opacity: 0.85;
      }

      /* Cheatsheet */
      .cs-section {
        margin-bottom: 24px;
      }
      .cs-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }

      /* Converter bits */
      .bit-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 3px;
        margin-bottom: 6px;
      }
      .bit-cell {
        aspect-ratio: 1;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .bit-cell.one {
        background: rgba(0, 212, 200, 0.25);
        color: var(--cyan);
        border: 1px solid rgba(0, 212, 200, 0.4);
      }
      .bit-cell.zero {
        background: var(--panel);
        color: var(--dim);
        border: 1px solid var(--border);
      }
      .bit-cell:hover {
        transform: scale(1.1);
      }

      /* DNS tool */
      .dns-result {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-top: 10px;
      }

      /* Animations */
      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fadein {
        animation: fadein 0.25s ease;
      }

      /* Two-column layout */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 800px) {
        .two-col {
          grid-template-columns: 1fr;
        }
      }

      /* Mobile utilities */
      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
        .show-mobile { display: block !important; }
        .flex-mobile-column { flex-direction: column !important; }
        .grid-mobile-1 { grid-template-columns: 1fr !important; }
        
        /* Table to Cards pattern */
        .mobile-cards {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }
        .mobile-card {
          background: var(--panel);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 12px;
        }
        .mobile-card-row {
          display: flex;
          justify-content: space-between;
          padding: 6px 0;
          border-bottom: 1px solid rgba(42, 42, 58, 0.3);
          font-size: 12px;
        }
        .mobile-card-row:last-child {
          border-bottom: none;
        }
        .mobile-card-label {
          color: var(--muted);
          font-weight: 500;
        }
        .mobile-card-value {
          font-family: var(--mono);
          text-align: right;
          word-break: break-all;
          padding-left: 10px;
        }
      }
      .show-mobile { display: none; }

      /* Info row */
      .info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(42, 42, 58, 0.5);
        font-size: 13px;
      }
      .info-row:last-child {
        border-bottom: none;
      }
      .info-key {
        color: var(--muted);
        font-size: 12px;
      }
      .info-val {
        font-family: var(--mono);
        color: var(--text);
      }

      @media (max-width: 768px) {
        .logo-area {
          display: none;
        }
        .mobile-menu-toggle {
          display: flex;
        }
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          width: 280px;
          z-index: 2000;
          transform: translateX(-100%);
          transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
          box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        .sidebar.is-open {
          transform: translateX(0);
        }
        .sidebar-mobile-header {
          display: flex;
        }
        .sidebar-search {
          position: relative;
          top: 0;
        }
        .topbar-badge, .header .badge-blue {
          display: none;
        }
        .topbar-title {
          font-size: 15px;
        }
        .content {
          padding: 16px;
        }
        .card {
          padding: 15px;
        }
        .footer {
          font-size: 9px;
          padding: 0 10px;
          text-align: center;
        }
      }
    </style>
